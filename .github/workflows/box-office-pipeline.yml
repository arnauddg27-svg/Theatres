name: Box Office Pipeline

on:
  schedule:
    # ── Phase 1: collect showtime links at ~5pm local (before shows start) ──
    # ET ~5pm = 21 UTC (Thu-Mon)
    - cron: '0 21 * * 4,5,6,0,1'
    # CT ~5pm = 23 UTC (Thu-Mon)
    - cron: '0 23 * * 4,5,6,0,1'
    # MT ~5pm = 23:30 UTC DST (Thu-Mon)
    - cron: '30 23 * * 4,5,6,0,1'
    # PT ~5pm = 1am UTC next day (Fri-Tue)
    - cron: '0 1 * * 5,6,0,1,2'
# ── Phase 2: fetch seat maps at ~11pm local (shows well underway) ───────
    # ET ~11pm = 3am UTC (Fri-Tue)
    - cron: '0 3 * * 5,6,0,1,2'
    # CT ~11pm = 5am UTC (Fri-Tue)
    - cron: '0 5 * * 5,6,0,1,2'
    # MT ~11pm = 5:30am UTC DST (Fri-Tue)
    - cron: '30 5 * * 5,6,0,1,2'
    # PT ~11pm = 7am UTC (Fri-Tue)
    - cron: '0 7 * * 5,6,0,1,2'
    # Tuesday 10am ET = 2pm UTC — auto-calibrate after weekend numbers are public
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      tz_group:
        description: 'Timezone group to scrape (ET, CT, PT, or ALL)'
        required: false
        default: 'ALL'
      phase:
        description: 'Phase to run: collect-links (Phase 1) or scrape (Phase 2)'
        required: false
        default: 'scrape'

permissions:
  contents: write

env:
  # Map UTC hour:minute → timezone group
  # Phase 1: 21:00=ET, 23:00=CT, 23:30=MT, 1:00=PT
  # Phase 2:  3:00=ET,  5:00=CT,  5:30=MT, 7:00=PT
  TZ_BY_HOUR:   '{"21:00":"ET","23:00":"CT","23:30":"MT","1:00":"PT","3:00":"ET","5:00":"CT","5:30":"MT","7:00":"PT"}'
  # Hour:minute values that indicate Phase 1 (collect-links)
  PHASE1_HOURS: '["21:00","23:00","23:30","1:00"]'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: box-office-tracker
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Determine timezone group and phase
        id: tz
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ github.event.inputs.tz_group || 'ALL' }}" >> "$GITHUB_OUTPUT"
            echo "phase=${{ github.event.inputs.phase || 'scrape' }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%-H)
            MIN=$(date -u +%-M)
            # Round minutes to :00 or :30 slot
            if [ "$MIN" -ge 15 ] && [ "$MIN" -lt 45 ]; then SLOT="$HOUR:30"; else SLOT="$HOUR:00"; fi
            GROUP=$(echo '${{ env.TZ_BY_HOUR }}' | python3 -c "import sys,json; print(json.load(sys.stdin).get(sys.argv[1],'ALL'))" "$SLOT")
            IS_PHASE1=$(echo '${{ env.PHASE1_HOURS }}' | python3 -c "import sys,json; print('collect-links' if str(sys.argv[1]) in json.load(sys.stdin) else 'scrape')" "$SLOT")
            echo "group=$GROUP" >> "$GITHUB_OUTPUT"
            echo "phase=$IS_PHASE1" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine if calibration day
        id: cal
        run: |
          DAY=$(date -u +%u)
          echo "is_tuesday=$( [ "$DAY" = "2" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Auto-calibrate (Tuesday only)
        if: steps.cal.outputs.is_tuesday == 'true'
        working-directory: box-office-tracker
        run: python3 calibrate.py

      - name: Phase 1 — collect showtime links (${{ steps.tz.outputs.group }})
        if: steps.cal.outputs.is_tuesday != 'true' && steps.tz.outputs.phase == 'collect-links'
        working-directory: box-office-tracker
        run: python3 scraper.py --collect-links ${{ steps.tz.outputs.group }} || python3 scraper.py --collect-links ${{ steps.tz.outputs.group }}

      - name: Phase 2 — collect seat data (${{ steps.tz.outputs.group }})
        if: steps.cal.outputs.is_tuesday != 'true' && steps.tz.outputs.phase == 'scrape'
        working-directory: box-office-tracker
        run: python3 scraper.py ${{ steps.tz.outputs.group }} || python3 scraper.py ${{ steps.tz.outputs.group }}

      - name: Generate predictions
        if: steps.cal.outputs.is_tuesday != 'true' && steps.tz.outputs.phase == 'scrape'
        working-directory: box-office-tracker
        run: python3 predict.py

      # Trading runs from EU VPS (Polymarket blocks US IPs).
      # GH Actions only collects data + predicts. The EU VPS cron
      # pulls the repo and runs trade.py separately.

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add box-office-tracker/data/
          git diff --staged --quiet && exit 0
          git commit -m "data: box office ${{ steps.tz.outputs.group }} ${{ steps.tz.outputs.phase }}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
