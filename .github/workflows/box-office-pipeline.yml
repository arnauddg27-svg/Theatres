name: Box Office Pipeline

on:
  # Scheduling is driven by a system cron on the self-hosted VPS
  # (/etc/cron.d/box-office-dispatch), which invokes `gh workflow run`
  # with explicit tz_group + phase inputs. GitHub's own `schedule:`
  # trigger was dropping ~30% of slots entirely (notably all PT slots
  # on 2026-04-21), which no matches_slot tolerance can recover from.
  #
  # Runner topology:
  #   - Phase 1 (collect-links): self-hosted VPS — not Queue-It'd, shared
  #     state file showtime-links.json benefits from single-writer serialization.
  #   - Phase 2 (scrape): GH-hosted ubuntu-latest with matrix [ET,CT,PT] —
  #     each matrix leg gets a fresh Azure IP, escaping AMC's Queue-It
  #     bot-blocker that had been zeroing out CT/PT on the VPS's flagged IP.
  #     (MT omitted — too few theatres to justify a separate Phase 1 schedule.)
  #   - finalize (predict + xlsx): GH-hosted, depends on scrape matrix.
  #   - Calibrate: self-hosted VPS (weekly, unchanged).
  workflow_dispatch:
    inputs:
      tz_group:
        description: 'Timezone group (ET, CT, PT, or ALL). For phase=scrape this is ignored — the matrix always fans out to ET/CT/PT (MT intentionally omitted).'
        required: false
        default: 'ALL'
      phase:
        description: 'Phase to run: collect-links (Phase 1), scrape (Phase 2), or calibrate'
        required: false
        default: 'scrape'
      force:
        description: 'Force Phase 2 even if showtime-links.json is stale (>12h old)'
        required: false
        default: 'false'
      test:
        description: 'Test mode: run Phase 2 on N theatres only per TZ (e.g. 5). Empty = full run.'
        required: false
        default: ''

permissions:
  contents: write

# Workflow-level concurrency keyed on phase. GitHub Actions concurrency groups
# apply across workflow runs, not across matrix legs within one run — so this
# queues a manual Phase 2 dispatch behind the 04:00 UTC scheduled scrape
# (preventing two simultaneous AMC matrix fan-outs from the same account) while
# leaving the three in-run matrix legs free to execute truly in parallel.
#
# Keying on `phase` means Phase 1 (collect-links) and Phase 2 (scrape) don't
# block each other — they write different files and can safely overlap. Same
# for calibrate. `cancel-in-progress: false` queues rather than cancels, so a
# mid-run scrape never loses partial data to an incoming manual dispatch.
concurrency:
  group: box-office-pipeline-${{ github.event.inputs.phase }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Phase 1 — collect showtime links. Runs on VPS because (a) it isn't
  # Queue-It'd, so IP rotation buys nothing, and (b) showtime-links.json is
  # shared state — parallel writers would conflict. VPS cron dispatches one
  # TZ at a time (5pm/6pm local), so this job always sees a single TZ.
  # ──────────────────────────────────────────────────────────────────────────
  collect-links:
    if: github.event.inputs.phase == 'collect-links'
    runs-on: [self-hosted, vps]
    timeout-minutes: 90

    steps:
      - name: Free disk space
        run: |
          rm -rf /home/gha/actions-runner/_work/_update 2>/dev/null || true
          rm -rf /home/gha/actions-runner/_work/_temp/* 2>/dev/null || true
          find /home/gha/actions-runner/_diag -maxdepth 1 -type f -name '*.log' -mtime +7 -delete 2>/dev/null || true
          current_ext=$(readlink /home/gha/actions-runner/externals 2>/dev/null | xargs basename 2>/dev/null)
          current_bin=$(readlink /home/gha/actions-runner/bin 2>/dev/null | xargs basename 2>/dev/null)
          if [ -n "$current_ext" ] && [ -n "$current_bin" ]; then
            for d in /home/gha/actions-runner/externals.* /home/gha/actions-runner/bin.*; do
              [ -e "$d" ] || continue
              base=$(basename "$d")
              [ "$base" != "$current_ext" ] && [ "$base" != "$current_bin" ] && rm -rf "$d"
            done
          fi
          pip3 cache purge 2>/dev/null || true
          apt-get clean 2>/dev/null || true
          df -h / | tail -1

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: false   # preserve .env and other untracked files between runs
          fetch-depth: 50   # dedup guard greps today's commits

      - name: Sync to latest main
        run: |
          git fetch --deepen=50 origin main
          git reset --hard origin/main

      - name: Dedup guard — skip if today's collect-links already committed
        id: dedup
        run: |
          # Force-bypass: when the workflow is dispatched with force=true, skip
          # the workflow-level dedup check entirely. This is the escape hatch
          # for re-scraping after a stale/late commit (e.g. a queued run from
          # yesterday committing today's data with last night's show_date —
          # which would otherwise dedup-block today's slot in 13 seconds).
          # Phase 2 honors the same `force=true` here for symmetry.
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force-running — bypassing dedup guard"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          pattern="data: box office ${{ github.event.inputs.tz_group }} collect-links"
          if git log --since="$today 00:00" --oneline --grep="$pattern" | grep -q .; then
            echo "Skipping — ${{ github.event.inputs.tz_group }} collect-links already ran today:"
            git log --since="$today 00:00" --oneline --grep="$pattern"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        working-directory: box-office-tracker
        run: |
          pip3 install -r requirements.txt
          python3 -m playwright install chromium --with-deps || python3 -m playwright install chromium

      - name: Phase 1 — collect showtime links (${{ github.event.inputs.tz_group }})
        if: steps.dedup.outputs.skip != 'true'
        working-directory: box-office-tracker
        timeout-minutes: 60
        run: python3 scraper.py --collect-links ${{ github.event.inputs.tz_group }}

      - name: Commit showtime links
        if: always() && steps.dedup.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only stage the files Phase 1 actually writes. A blanket
          # `git add box-office-tracker/` would sweep up any stray untracked
          # files (e.g. runner caches, locally-modified secrets).
          git add box-office-tracker/data/showtime-links.json \
                  box-office-tracker/data/theatre-counts.json \
                  box-office-tracker/data/polymarket-markets.csv \
                  box-office-tracker/data/run-log.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: box office ${{ github.event.inputs.tz_group }} collect-links"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            git pull --rebase -X ours origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            if [ "$i" = "3" ]; then
              echo "All 3 push attempts failed — data not committed."
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            sleep $((i * 15))
          done

  # ──────────────────────────────────────────────────────────────────────────
  # Phase 2 — seat data scrape. Runs on ubuntu-latest matrix so each TZ gets
  # a fresh Azure IP, defeating AMC's Queue-It IP-flagging that had been
  # zeroing out CT/PT on the VPS IP. All three TZs run in parallel (~60 min
  # wall-clock instead of the old staggered 3+ hours on one self-hosted box).
  #
  # Commit race: each matrix leg appends its TZ's rows to seat-counts.csv and
  # pushes. The retry loop handles 3-way contention via rebase with jittered
  # backoff (6 attempts, up to ~4 min total). The append-only data files have
  # `merge=union` in .gitattributes so concurrent appends don't silently drop
  # each other — without that, `-X ours` would treat peer TZ additions as
  # "patch already upstream" and erase them.
  # ──────────────────────────────────────────────────────────────────────────
  scrape:
    if: github.event.inputs.phase == 'scrape'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false   # one TZ's Queue-It or timeout shouldn't cancel the others
      matrix:
        tz: [ET, CT, PT]   # MT intentionally omitted — too few theatres to be worth the Phase 1 schedule

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 50

      - name: Sync to latest main
        # Matrix legs start ~simultaneously; by the time the last one begins
        # earlier legs may have already pushed. Reset to current tip so each
        # leg appends to the latest CSV rather than the commit-triggering SHA.
        run: |
          git fetch --deepen=50 origin main
          git reset --hard origin/main

      - name: Dedup guard — skip if ${{ matrix.tz }} already scraped today
        id: dedup
        run: |
          # Force-bypass: same escape hatch as Phase 1 — `force=true` skips the
          # workflow-level dedup so a manual re-dispatch can re-scrape the same
          # UTC day after a partial / aborted / stale-stamped Phase 2 commit.
          # (Note: the `--force` flag passed to scraper.py below is a separate
          # bypass for the in-Python 12h staleness check on showtime-links.json
          # — both layers have to be unlocked to fully re-run a same-day scrape.)
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force-running — bypassing dedup guard"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          pattern="data: box office ${{ matrix.tz }} scrape"
          if git log --since="$today 00:00" --oneline --grep="$pattern" | grep -q .; then
            echo "Skipping — ${{ matrix.tz }} scrape already ran today:"
            git log --since="$today 00:00" --oneline --grep="$pattern"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        working-directory: box-office-tracker
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Phase 2 — collect seat data (${{ matrix.tz }})
        if: steps.dedup.outputs.skip != 'true'
        working-directory: box-office-tracker
        timeout-minutes: 75
        run: |
          # Default-off: only pass --force when the input is explicitly "true".
          # Matches the workflow_dispatch input default of 'false' and the VPS
          # dispatch.sh default, so an empty/missing input can't silently
          # bypass the 12h staleness guard on showtime-links.json.
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          TEST_FLAG=""
          if [ -n "${{ github.event.inputs.test }}" ]; then TEST_FLAG="--test ${{ github.event.inputs.test }}"; fi
          python scraper.py $FORCE_FLAG $TEST_FLAG ${{ matrix.tz }}

      - name: Commit ${{ matrix.tz }} seat data
        # always() so partial data from a crashed scrape still gets preserved.
        # The scraper flushes per-theatre, so even a mid-run failure usually has
        # rows worth committing.
        if: always() && steps.dedup.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only stage files Phase 2 actually writes. Matrix legs must not
          # commit xlsx or predictions (those are regenerated once in the
          # finalize job from the merged CSV). theatre-counts.json is written
          # only by Phase 1 (fetch_bom_theatre_counts in run_collect_links_async).
          git add box-office-tracker/data/seat-counts.csv \
                  box-office-tracker/data/polymarket-markets.csv \
                  box-office-tracker/data/run-log.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit (run produced no new output)."
            exit 0
          fi
          git commit -m "data: box office ${{ matrix.tz }} scrape"
          # 6 attempts with jittered backoff handles 4-way push contention.
          # Worst-case wait is ~4 min which still fits well under the 90 min
          # job budget. -X ours keeps rows from peer TZs when rebasing.
          for i in 1 2 3 4 5 6; do
            git rebase --abort 2>/dev/null || true
            git pull --rebase -X ours origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            if [ "$i" = "6" ]; then
              echo "All 6 push attempts failed — data not committed."
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            # Jittered backoff: (i*8) base + 0-14s random = avoid thundering herd
            sleep $((i * 8 + RANDOM % 15))
          done

  # ──────────────────────────────────────────────────────────────────────────
  # Finalize — runs once after all matrix legs finish. Regenerates
  # predictions and xlsx from the fully-merged CSV. A single writer here
  # means no race on these derived artifacts.
  # ──────────────────────────────────────────────────────────────────────────
  finalize:
    needs: scrape
    # Run regardless of whether individual matrix legs succeeded (always()),
    # but skip if scrape didn't run at all (phase != scrape) or was cancelled.
    if: >
      always() &&
      github.event.inputs.phase == 'scrape' &&
      (needs.scrape.result == 'success' || needs.scrape.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 50

      - name: Sync to latest main
        # Must pick up all 3 matrix commits that just landed.
        run: |
          git fetch --deepen=50 origin main
          git reset --hard origin/main

      - name: Install dependencies
        working-directory: box-office-tracker
        run: |
          pip install -r requirements.txt
          # No playwright needed here — predict.py and export_seat_counts_xlsx.py
          # are pure-pandas. Skipping the chromium download saves ~2 min.

      - name: Generate predictions
        working-directory: box-office-tracker
        run: python predict.py

      - name: Refresh Excel workbook
        working-directory: box-office-tracker
        run: python export_seat_counts_xlsx.py

      - name: Commit predictions + xlsx
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Scheduled finalize only writes seat-counts.xlsx — predict.py is
          # read-only unless invoked with --actual. Explicit allow-list so
          # we never accidentally commit untracked files from the runner.
          git add box-office-tracker/data/seat-counts.xlsx 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No derived artifacts changed (nothing new from matrix, or regeneration is idempotent)."
            exit 0
          fi
          git commit -m "data: box office predictions + xlsx"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            git pull --rebase -X ours origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            if [ "$i" = "3" ]; then
              echo "All 3 push attempts failed — derived artifacts not committed."
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            sleep $((i * 15))
          done

  # ──────────────────────────────────────────────────────────────────────────
  # Calibrate — Tuesday 10am ET only. Stays on VPS; doesn't hit AMC.
  # ──────────────────────────────────────────────────────────────────────────
  calibrate:
    if: github.event.inputs.phase == 'calibrate'
    runs-on: [self-hosted, vps]
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: false
          fetch-depth: 50

      - name: Sync to latest main
        run: |
          git fetch --deepen=50 origin main
          git reset --hard origin/main

      - name: Install dependencies
        working-directory: box-office-tracker
        run: pip3 install -r requirements.txt

      - name: Auto-calibrate
        working-directory: box-office-tracker
        run: python3 calibrate.py

      - name: Commit calibration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # calibrate.py writes exactly one file. Explicit allow-list so a
          # stray untracked file on the VPS runner (e.g. a playwright cache,
          # a locally-edited .env) can't ride along into the commit.
          git add box-office-tracker/data/calibration.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No calibration changes."
            exit 0
          fi
          git commit -m "data: box office calibration"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            git pull --rebase -X ours origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            if [ "$i" = "3" ]; then exit 1; fi
            sleep $((i * 15))
          done
