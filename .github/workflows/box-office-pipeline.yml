name: Box Office Pipeline

on:
  schedule:
    # ── Phase 1: collect showtime links at ~5pm local (before shows start) ──
    # ET ~5pm = 21 UTC
    - cron: '0 21 * * 4,5,6,0'
    # CT ~5pm = 23 UTC
    - cron: '0 23 * * 4,5,6,0'
    # PT ~5pm = 1am UTC (Fri-Mon, next calendar day)
    - cron: '0 1 * * 5,6,0,1'
    # ── Phase 2: fetch seat maps at ~10pm local (shows well underway) ────────
    # ET ~10pm = 3am UTC
    - cron: '0 3 * * 4,5,6,0'
    # CT ~10pm = 5am UTC
    - cron: '0 5 * * 4,5,6,0'
    # PT ~10pm = 7am UTC
    - cron: '0 7 * * 4,5,6,0'
    # Tuesday 10am ET = 2pm UTC — auto-calibrate after weekend numbers are public
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      tz_group:
        description: 'Timezone group to scrape (ET, CT, PT, or ALL)'
        required: false
        default: 'ALL'
      phase:
        description: 'Phase to run: collect-links (Phase 1) or scrape (Phase 2)'
        required: false
        default: 'scrape'

permissions:
  contents: write

env:
  # Map UTC hour → timezone group
  # Phase 1 (collect-links): 21=ET, 23=CT, 1=PT
  # Phase 2 (seat maps):      2=ET,  4=CT, 6=PT
  TZ_BY_HOUR:   '{"21":"ET","23":"CT","1":"PT","3":"ET","5":"CT","7":"PT"}'
  # Hours that indicate Phase 1 (collect-links) rather than Phase 2 (seat scrape)
  PHASE1_HOURS: '["21","23","1"]'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: box-office-tracker
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Determine timezone group and phase
        id: tz
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ github.event.inputs.tz_group || 'ALL' }}" >> "$GITHUB_OUTPUT"
            echo "phase=${{ github.event.inputs.phase || 'scrape' }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%-H)
            GROUP=$(echo '${{ env.TZ_BY_HOUR }}' | python3 -c "import sys,json; print(json.load(sys.stdin).get(sys.argv[1],'ALL'))" "$HOUR")
            IS_PHASE1=$(echo '${{ env.PHASE1_HOURS }}' | python3 -c "import sys,json; print('collect-links' if str(sys.argv[1]) in json.load(sys.stdin) else 'scrape')" "$HOUR")
            echo "group=$GROUP" >> "$GITHUB_OUTPUT"
            echo "phase=$IS_PHASE1" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine if calibration day
        id: cal
        run: |
          DAY=$(date -u +%u)
          echo "is_tuesday=$( [ "$DAY" = "2" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Auto-calibrate (Tuesday only)
        if: steps.cal.outputs.is_tuesday == 'true'
        working-directory: box-office-tracker
        run: python3 calibrate.py

      - name: Phase 1 — collect showtime links (${{ steps.tz.outputs.group }})
        if: steps.cal.outputs.is_tuesday != 'true' && steps.tz.outputs.phase == 'collect-links'
        working-directory: box-office-tracker
        run: python3 scraper.py --collect-links ${{ steps.tz.outputs.group }}

      - name: Phase 2 — collect seat data (${{ steps.tz.outputs.group }})
        if: steps.cal.outputs.is_tuesday != 'true' && steps.tz.outputs.phase == 'scrape'
        working-directory: box-office-tracker
        run: python3 scraper.py ${{ steps.tz.outputs.group }}

      - name: Generate predictions
        if: steps.cal.outputs.is_tuesday != 'true' && steps.tz.outputs.phase == 'scrape'
        working-directory: box-office-tracker
        run: python3 predict.py

      # Trading runs from EU VPS (Polymarket blocks US IPs).
      # GH Actions only collects data + predicts. The EU VPS cron
      # pulls the repo and runs trade.py separately.

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add box-office-tracker/data/
          git diff --staged --quiet && exit 0
          git commit -m "data: box office ${{ steps.tz.outputs.group }} ${{ steps.tz.outputs.phase }}"
          git pull --rebase origin main
          git push
