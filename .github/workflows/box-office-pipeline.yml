name: Box Office Pipeline

on:
  schedule:
    # 1 AM ET (EDT = UTC-4) on Friday, Saturday, Sunday
    - cron: '0 5 * * 5,6,0'
  workflow_dispatch:  # allow manual runs from GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect AMC & Polymarket data
        working-directory: box-office-tracker
        run: python3 collect.py

      - name: Generate predictions
        working-directory: box-office-tracker
        run: python3 predict.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add box-office-tracker/data/
          git diff --staged --quiet || git commit -m "chore: box office data $(date -u '+%Y-%m-%d')"
          git push
