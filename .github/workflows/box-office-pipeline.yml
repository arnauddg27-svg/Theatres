name: Box Office Pipeline

on:
  # Scheduling is driven by a system cron on the self-hosted VPS
  # (/etc/cron.d/box-office-dispatch), which invokes `gh workflow run`
  # with explicit tz_group + phase inputs. GitHub's own `schedule:`
  # trigger was dropping ~30% of slots entirely (notably all PT slots
  # on 2026-04-21), which no matches_slot tolerance can recover from.
  # VPS cron fires within a second, every time — same self-hosted host
  # that runs the scraper, so no extra reliability surface.
  workflow_dispatch:
    inputs:
      tz_group:
        description: 'Timezone group to scrape (ET, CT, MT, PT, or ALL)'
        required: false
        default: 'ALL'
      phase:
        description: 'Phase to run: collect-links (Phase 1) or scrape (Phase 2)'
        required: false
        default: 'scrape'
      force:
        description: 'Force Phase 2 even if showtime-links.json is stale (>12h old)'
        required: false
        default: 'false'
      test:
        description: 'Test mode: run Phase 2 on N theatres only (e.g. 5). Empty = full run.'
        required: false
        default: ''

permissions:
  contents: write

# No workflow-level concurrency block: GitHub's concurrency caps the queue at
# 1 running + 1 pending, so a third trigger cancels the older queued one.
# With 4 TZ triggers firing within a 4-hour window, that would drop jobs.
# Instead we rely on (a) the single self-hosted runner to naturally serialize
# and (b) the "Sync to latest main" step to ensure each job starts from the
# current tip — which is what actually prevents the data-loss race.

jobs:
  collect:
    runs-on: [self-hosted, vps]
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          rm -rf /home/gha/actions-runner/_work/_update 2>/dev/null || true
          rm -rf /home/gha/actions-runner/_work/_temp/* 2>/dev/null || true
          # Preserve the previous job's Worker_*.log (and other _diag logs) so we
          # can diagnose failures post-mortem. Only rotate logs older than 7 days
          # to keep the directory bounded without losing the last failure context.
          find /home/gha/actions-runner/_diag -maxdepth 1 -type f -name '*.log' -mtime +7 -delete 2>/dev/null || true
          # Remove old runner versions — keep only what the current symlinks point to
          current_ext=$(readlink /home/gha/actions-runner/externals 2>/dev/null | xargs basename 2>/dev/null)
          current_bin=$(readlink /home/gha/actions-runner/bin 2>/dev/null | xargs basename 2>/dev/null)
          if [ -n "$current_ext" ] && [ -n "$current_bin" ]; then
            for d in /home/gha/actions-runner/externals.* /home/gha/actions-runner/bin.*; do
              [ -e "$d" ] || continue
              base=$(basename "$d")
              [ "$base" != "$current_ext" ] && [ "$base" != "$current_bin" ] && rm -rf "$d"
            done
          fi
          pip3 cache purge 2>/dev/null || true
          apt-get clean 2>/dev/null || true
          df -h / | tail -1

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: false   # preserve .env and other untracked files between runs
          # fetch-depth 50 so the Dedup guard step can grep today's commit
          # history. Depth 1 (default) would only show the triggering SHA,
          # hiding earlier scrape commits from the same day and defeating
          # the dedup check.
          fetch-depth: 50

      - name: Sync to latest main
        # checkout@v4 pins to the SHA that triggered the workflow, which can be
        # stale if this job was queued behind another (e.g. ET scheduled at
        # 03:00 UTC but runs after CT's 05:00 UTC job finished). Reset to the
        # current tip of main so the scraper appends to the latest CSV.
        # --deepen keeps history from collapsing back to shallow on fetch.
        # .env survives because it's untracked.
        run: |
          git fetch --deepen=50 origin main
          git reset --hard origin/main

      - name: Determine timezone group and phase
        id: tz
        run: |
          # Only workflow_dispatch triggers this workflow — the VPS cron
          # dispatches with explicit tz_group + phase, so the old
          # matches_slot DST-resolution logic is handled upstream by
          # /root/box-office-dispatch/dispatch.sh on the runner host.
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Unsupported event type: ${{ github.event_name }}" >&2
            exit 1
          fi
          echo "group=${{ github.event.inputs.tz_group || 'ALL' }}" >> "$GITHUB_OUTPUT"
          echo "phase=${{ github.event.inputs.phase || 'scrape' }}" >> "$GITHUB_OUTPUT"

      - name: Dedup guard — skip if today's phase already committed
        id: dedup
        if: steps.tz.outputs.phase == 'scrape' || steps.tz.outputs.phase == 'collect-links'
        run: |
          # Defense in depth against double-scrapes. With VPS-side dispatch
          # the local-hour check in dispatch.sh should already prevent
          # double-fires, but manual re-dispatches or a future cron edit
          # could still queue two jobs for the same (tz, phase, day).
          # Use the commit log as the cross-run source of truth.
          today=$(date -u +%Y-%m-%d)
          pattern="data: box office ${{ steps.tz.outputs.group }} ${{ steps.tz.outputs.phase }}"
          if git log --since="$today 00:00" --oneline --grep="$pattern" | grep -q .; then
            echo "Skipping — ${{ steps.tz.outputs.group }} ${{ steps.tz.outputs.phase }} already ran today:"
            git log --since="$today 00:00" --oneline --grep="$pattern"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.tz.outputs.phase != 'skip' && steps.dedup.outputs.skip != 'true'
        working-directory: box-office-tracker
        run: |
          pip3 install -r requirements.txt
          python3 -m playwright install chromium --with-deps || python3 -m playwright install chromium

      - name: Auto-calibrate (Tuesday 10am ET only)
        if: steps.tz.outputs.phase == 'calibrate'
        working-directory: box-office-tracker
        run: python3 calibrate.py

      - name: Phase 1 — collect showtime links (${{ steps.tz.outputs.group }})
        if: steps.tz.outputs.phase == 'collect-links' && steps.dedup.outputs.skip != 'true'
        working-directory: box-office-tracker
        timeout-minutes: 60
        run: python3 scraper.py --collect-links ${{ steps.tz.outputs.group }}

      - name: Phase 2 — collect seat data (${{ steps.tz.outputs.group }})
        id: phase2
        if: steps.tz.outputs.phase == 'scrape' && steps.dedup.outputs.skip != 'true'
        working-directory: box-office-tracker
        timeout-minutes: 75
        run: |
          # Scheduled runs always pass --force so a slightly delayed Phase 1
          # (e.g. >12h gap) never silently aborts Phase 2.
          # Manual dispatch can override force=false for safety testing.
          FORCE_FLAG="--force"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "false" ]; then
            FORCE_FLAG=""
          fi
          TEST_FLAG=""
          if [ -n "${{ github.event.inputs.test }}" ]; then TEST_FLAG="--test ${{ github.event.inputs.test }}"; fi
          # The scraper already has internal per-theatre retries and timeouts.
          # An outer retry used to double runtime when the VPS IP was stuck in
          # AMC's queue-it redirect, so we rely on in-process recovery instead.
          python3 scraper.py $FORCE_FLAG $TEST_FLAG ${{ steps.tz.outputs.group }}

      - name: Generate predictions
        if: steps.tz.outputs.phase == 'scrape' && steps.phase2.outcome == 'success'
        working-directory: box-office-tracker
        run: python3 predict.py

      - name: Refresh Excel workbook
        # Rebuild from whatever's in the CSV, even if the scrape step
        # partially failed. The commit step also uses `always()` so the
        # xlsx stays in sync with partial CSV updates instead of drifting.
        if: always() && steps.tz.outputs.phase == 'scrape' && steps.dedup.outputs.skip != 'true'
        working-directory: box-office-tracker
        run: python3 export_seat_counts_xlsx.py

      - name: Commit updated data
        # Run whenever the job had work to do (phase != skip), even if the
        # scrape or prediction step failed. The scraper flushes rows to CSV as
        # each theatre completes, so a mid-run failure can still have partial
        # data worth preserving.
        if: always() && steps.tz.outputs.phase != 'skip' && steps.tz.outputs.phase != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add box-office-tracker/
          if git diff --staged --quiet; then
            echo "No data changes to commit (run produced no new output)."
            exit 0
          fi
          git commit -m "data: box office ${{ steps.tz.outputs.group }} ${{ steps.tz.outputs.phase }}"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            # -X ours on rebase: prefer the remote base (= rows committed by
            # other TZ runs while we were scraping). Our freshly-appended rows
            # are new lines at EOF, so they don't conflict and still apply.
            # Using -X theirs here previously dropped other TZs' rows.
            git pull --rebase -X ours origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            if [ "$i" = "3" ]; then
              echo "All 3 push attempts failed — data not committed."
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            sleep $((i * 15))   # exponential backoff: 15s, 30s
          done
