name: Box Office Pipeline

on:
  schedule:
    # ── Phase 1: collect showtime links ─────────────────────────────────────
    # Mon-Fri at ~5pm local; Sat-Sun at ~noon local
    # ET 5pm Mon-Fri = 21 UTC (EDT=UTC-4, days 1,2,3,4,5)
    - cron: '0 21 * * 1,2,3,4,5'
    # ET noon Sat/Sun = 16 UTC (days 6,0)
    - cron: '0 16 * * 6,0'
    # CT 5pm Mon-Fri = 22 UTC (CDT=UTC-5, days 1,2,3,4,5)
    - cron: '0 22 * * 1,2,3,4,5'
    # CT noon Sat/Sun = 17 UTC (days 6,0)
    - cron: '0 17 * * 6,0'
    # MT 5pm Mon-Fri = 23 UTC (MDT=UTC-6, days 1,2,3,4,5)
    - cron: '0 23 * * 1,2,3,4,5'
    # MT noon Sat/Sun = 18 UTC (days 6,0)
    - cron: '0 18 * * 6,0'
    # PT 5pm Mon-Fri = midnight UTC next day (PDT=UTC-7, days 2,3,4,5,6)
    - cron: '0 0 * * 2,3,4,5,6'
    # PT noon Sat/Sun = 19 UTC (days 6,0)
    - cron: '0 19 * * 6,0'
    # ── Phase 2: fetch seat maps at ~11pm local every day ───────────────────
    # ET ~11pm = 3am UTC (EDT=UTC-4, every day)
    - cron: '0 3 * * *'
    # CT ~11pm = 4am UTC (CDT=UTC-5, every day)
    - cron: '0 4 * * *'
    # MT ~11pm = 5am UTC (MDT=UTC-6, every day)
    - cron: '0 5 * * *'
    # PT ~11pm = 6am UTC (PDT=UTC-7, every day)
    - cron: '0 6 * * *'
    # Tuesday 10am ET = 2pm UTC — auto-calibrate after weekend numbers are public
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      tz_group:
        description: 'Timezone group to scrape (ET, CT, PT, or ALL)'
        required: false
        default: 'ALL'
      phase:
        description: 'Phase to run: collect-links (Phase 1) or scrape (Phase 2)'
        required: false
        default: 'scrape'

permissions:
  contents: write

env:
  # Map UTC hour:minute → timezone group
  # Phase 1 5pm: 21:00=ET, 22:00=CT, 23:00=MT, 0:00=PT
  # Phase 1 noon: 16:00=ET, 17:00=CT, 18:00=MT, 19:00=PT
  # Phase 2:       3:00=ET,  4:00=CT,  5:00=MT,  6:00=PT
  TZ_BY_HOUR:   '{"21:00":"ET","22:00":"CT","23:00":"MT","0:00":"PT","16:00":"ET","17:00":"CT","18:00":"MT","19:00":"PT","3:00":"ET","4:00":"CT","5:00":"MT","6:00":"PT"}'
  # Hour:minute values that indicate Phase 1 (collect-links)
  PHASE1_HOURS: '["21:00","22:00","23:00","0:00","16:00","17:00","18:00","19:00"]'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: box-office-tracker
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Determine timezone group and phase
        id: tz
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ github.event.inputs.tz_group || 'ALL' }}" >> "$GITHUB_OUTPUT"
            echo "phase=${{ github.event.inputs.phase || 'scrape' }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%-H)
            MIN=$(date -u +%-M)
            # Round minutes to :00 or :30 slot
            if [ "$MIN" -ge 15 ] && [ "$MIN" -lt 45 ]; then SLOT="$HOUR:30"; else SLOT="$HOUR:00"; fi
            GROUP=$(echo '${{ env.TZ_BY_HOUR }}' | python3 -c "import sys,json; print(json.load(sys.stdin).get(sys.argv[1],'ALL'))" "$SLOT")
            IS_PHASE1=$(echo '${{ env.PHASE1_HOURS }}' | python3 -c "import sys,json; print('collect-links' if str(sys.argv[1]) in json.load(sys.stdin) else 'scrape')" "$SLOT")
            echo "group=$GROUP" >> "$GITHUB_OUTPUT"
            echo "phase=$IS_PHASE1" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine if calibration slot
        id: cal
        run: |
          HOUR=$(date -u +%-H)
          DAY=$(date -u +%u)
          # Only the dedicated 14:00 UTC Tuesday cron is the calibration slot
          echo "is_cal_slot=$( [ "$DAY" = "2" ] && [ "$HOUR" = "14" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Auto-calibrate (Tuesday 10am ET only)
        if: steps.cal.outputs.is_cal_slot == 'true'
        working-directory: box-office-tracker
        run: python3 calibrate.py

      - name: Phase 1 — collect showtime links (${{ steps.tz.outputs.group }})
        if: steps.cal.outputs.is_cal_slot != 'true' && steps.tz.outputs.phase == 'collect-links'
        working-directory: box-office-tracker
        run: python3 scraper.py --collect-links ${{ steps.tz.outputs.group }} || python3 scraper.py --collect-links ${{ steps.tz.outputs.group }}

      - name: Phase 2 — collect seat data (${{ steps.tz.outputs.group }})
        if: steps.cal.outputs.is_cal_slot != 'true' && steps.tz.outputs.phase == 'scrape'
        working-directory: box-office-tracker
        run: python3 scraper.py ${{ steps.tz.outputs.group }} || python3 scraper.py ${{ steps.tz.outputs.group }}

      - name: Generate predictions
        if: steps.cal.outputs.is_cal_slot != 'true' && steps.tz.outputs.phase == 'scrape'
        working-directory: box-office-tracker
        run: python3 predict.py

      # Trading runs from EU VPS (Polymarket blocks US IPs).
      # GH Actions only collects data + predicts. The EU VPS cron
      # pulls the repo and runs trade.py separately.

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add box-office-tracker/data/
          git diff --staged --quiet && exit 0
          git commit -m "data: box office ${{ steps.tz.outputs.group }} ${{ steps.tz.outputs.phase }}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            [ "$i" = "3" ] && exit 1
            sleep 10
          done
