name: Box Office Pipeline

on:
  schedule:
    # ── Phase 1: collect showtime links ─────────────────────────────────────
    # ET runs at ~5pm weekdays / noon weekends; CT/MT/PT run one hour later
    # ET 5pm Mon-Fri = 21 UTC (EDT=UTC-4, days 1,2,3,4,5)
    - cron: '0 21 * * 1,2,3,4,5'
    # ET noon Sat/Sun = 16 UTC (days 6,0)
    - cron: '0 16 * * 6,0'
    # CT 6pm Mon-Fri = 23 UTC (CDT=UTC-5, days 1,2,3,4,5)
    - cron: '0 23 * * 1,2,3,4,5'
    # CT 1pm Sat/Sun = 18 UTC (days 6,0)
    - cron: '0 18 * * 6,0'
    # MT 6pm Mon-Fri = midnight UTC next day (MDT=UTC-6, days 2,3,4,5,6)
    - cron: '0 0 * * 2,3,4,5,6'
    # MT 1pm Sat/Sun = 19 UTC (days 6,0)
    - cron: '0 19 * * 6,0'
    # PT 6pm Mon-Fri = 1am UTC next day (PDT=UTC-7, days 2,3,4,5,6)
    - cron: '0 1 * * 2,3,4,5,6'
    # PT 1pm Sat/Sun = 20 UTC (days 6,0)
    - cron: '0 20 * * 6,0'
    # ── Phase 2: fetch seat maps (ET ~11pm, CT/MT/PT ~midnight local) ──────
    # ET ~11pm = 3am UTC (EDT=UTC-4, every day)
    - cron: '0 3 * * *'
    # CT ~midnight = 5am UTC (CDT=UTC-5, every day)
    - cron: '0 5 * * *'
    # MT ~midnight = 6am UTC (MDT=UTC-6, every day)
    - cron: '0 6 * * *'
    # PT ~midnight = 7am UTC (PDT=UTC-7, every day)
    - cron: '0 7 * * *'
    # Tuesday 10am ET = 2pm UTC — auto-calibrate after weekend numbers are public
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      tz_group:
        description: 'Timezone group to scrape (ET, CT, MT, PT, or ALL)'
        required: false
        default: 'ALL'
      phase:
        description: 'Phase to run: collect-links (Phase 1) or scrape (Phase 2)'
        required: false
        default: 'scrape'
      force:
        description: 'Force Phase 2 even if showtime-links.json is stale (>12h old)'
        required: false
        default: 'false'
      test:
        description: 'Test mode: run Phase 2 on N theatres only (e.g. 5). Empty = full run.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  collect:
    runs-on: [self-hosted, vps]
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          rm -rf /home/gha/actions-runner/_work/_update 2>/dev/null || true
          rm -rf /home/gha/actions-runner/_work/_temp/* 2>/dev/null || true
          rm -f /home/gha/actions-runner/_diag/*.log 2>/dev/null || true
          # Remove old runner versions — keep only what the current symlinks point to
          current_ext=$(readlink /home/gha/actions-runner/externals 2>/dev/null | xargs basename 2>/dev/null)
          current_bin=$(readlink /home/gha/actions-runner/bin 2>/dev/null | xargs basename 2>/dev/null)
          if [ -n "$current_ext" ] && [ -n "$current_bin" ]; then
            for d in /home/gha/actions-runner/externals.* /home/gha/actions-runner/bin.*; do
              [ -e "$d" ] || continue
              base=$(basename "$d")
              [ "$base" != "$current_ext" ] && [ "$base" != "$current_bin" ] && rm -rf "$d"
            done
          fi
          pip3 cache purge 2>/dev/null || true
          apt-get clean 2>/dev/null || true
          df -h / | tail -1

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: false   # preserve .env and other untracked files between runs

      - name: Install dependencies
        working-directory: box-office-tracker
        run: |
          pip3 install -r requirements.txt
          python3 -m playwright install chromium --with-deps || python3 -m playwright install chromium

      - name: Determine timezone group and phase
        id: tz
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ github.event.inputs.tz_group || 'ALL' }}" >> "$GITHUB_OUTPUT"
            echo "phase=${{ github.event.inputs.phase || 'scrape' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              '0 21 * * 1,2,3,4,5'|'0 16 * * 6,0')
                echo "group=ET" >> "$GITHUB_OUTPUT"
                echo "phase=collect-links" >> "$GITHUB_OUTPUT"
                ;;
              '0 23 * * 1,2,3,4,5'|'0 18 * * 6,0')
                echo "group=CT" >> "$GITHUB_OUTPUT"
                echo "phase=collect-links" >> "$GITHUB_OUTPUT"
                ;;
              '0 0 * * 2,3,4,5,6'|'0 19 * * 6,0')
                echo "group=MT" >> "$GITHUB_OUTPUT"
                echo "phase=collect-links" >> "$GITHUB_OUTPUT"
                ;;
              '0 1 * * 2,3,4,5,6'|'0 20 * * 6,0')
                echo "group=PT" >> "$GITHUB_OUTPUT"
                echo "phase=collect-links" >> "$GITHUB_OUTPUT"
                ;;
              '0 3 * * *')
                echo "group=ET" >> "$GITHUB_OUTPUT"
                echo "phase=scrape" >> "$GITHUB_OUTPUT"
                ;;
              '0 5 * * *')
                echo "group=CT" >> "$GITHUB_OUTPUT"
                echo "phase=scrape" >> "$GITHUB_OUTPUT"
                ;;
              '0 6 * * *')
                echo "group=MT" >> "$GITHUB_OUTPUT"
                echo "phase=scrape" >> "$GITHUB_OUTPUT"
                ;;
              '0 7 * * *')
                echo "group=PT" >> "$GITHUB_OUTPUT"
                echo "phase=scrape" >> "$GITHUB_OUTPUT"
                ;;
              '0 14 * * 2')
                echo "group=ALL" >> "$GITHUB_OUTPUT"
                echo "phase=calibrate" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "Unexpected schedule: ${{ github.event.schedule }}" >&2
                exit 1
                ;;
            esac
          else
            echo "Unsupported event type: ${{ github.event_name }}" >&2
            exit 1
          fi

      - name: Auto-calibrate (Tuesday 10am ET only)
        if: steps.tz.outputs.phase == 'calibrate'
        working-directory: box-office-tracker
        run: python3 calibrate.py

      - name: Phase 1 — collect showtime links (${{ steps.tz.outputs.group }})
        if: steps.tz.outputs.phase == 'collect-links'
        working-directory: box-office-tracker
        run: |
          python3 scraper.py --collect-links ${{ steps.tz.outputs.group }} || \
            (echo "Phase 1 attempt 1 failed, retrying in 15s..." && sleep 15 && \
             python3 scraper.py --collect-links ${{ steps.tz.outputs.group }})

      - name: Phase 2 — collect seat data (${{ steps.tz.outputs.group }})
        if: steps.tz.outputs.phase == 'scrape'
        working-directory: box-office-tracker
        run: |
          # Scheduled runs always pass --force so a slightly delayed Phase 1
          # (e.g. >12h gap) never silently aborts Phase 2.
          # Manual dispatch can override force=false for safety testing.
          FORCE_FLAG="--force"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "false" ]; then
            FORCE_FLAG=""
          fi
          TEST_FLAG=""
          if [ -n "${{ github.event.inputs.test }}" ]; then TEST_FLAG="--test ${{ github.event.inputs.test }}"; fi
          python3 scraper.py $FORCE_FLAG $TEST_FLAG ${{ steps.tz.outputs.group }} || \
            (echo "Phase 2 attempt 1 failed, retrying in 15s..." && sleep 15 && \
             python3 scraper.py $FORCE_FLAG $TEST_FLAG ${{ steps.tz.outputs.group }})

      - name: Generate predictions
        if: steps.tz.outputs.phase == 'scrape'
        working-directory: box-office-tracker
        run: python3 predict.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add box-office-tracker/
          if git diff --staged --quiet; then
            echo "No data changes to commit (run produced no new output)."
            exit 0
          fi
          git commit -m "data: box office ${{ steps.tz.outputs.group }} ${{ steps.tz.outputs.phase }}"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            # -X theirs: on data-file conflicts, our freshly-scraped version wins
            git pull --rebase -X theirs origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            if [ "$i" = "3" ]; then
              echo "All 3 push attempts failed — data not committed."
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            sleep $((i * 15))   # exponential backoff: 15s, 30s
          done
