name: Box Office Pipeline

on:
  schedule:
    # Thu-Sun evening runs, staggered by timezone:
    # ET ~8pm = midnight UTC  (Thu=4, Fri=5, Sat=6, Sun=0)
    - cron: '0 0 * * 4,5,6,0'
    # CT ~8pm = 2am UTC
    - cron: '0 2 * * 4,5,6,0'
    # PT ~8pm = 4am UTC
    - cron: '0 4 * * 4,5,6,0'
    # Tuesday 10am ET = 2pm UTC — auto-calibrate after weekend numbers are public
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      tz_group:
        description: 'Timezone group to scrape (ET, CT, PT, or ALL)'
        required: false
        default: 'ALL'

env:
  # Map UTC hour to timezone group for scheduled runs
  # 0=ET, 2=CT, 4=PT
  TZ_BY_HOUR: '{"0":"ET","2":"CT","4":"PT"}'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: box-office-tracker
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Determine timezone group
        id: tz
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ github.event.inputs.tz_group || 'ALL' }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%-H)
            GROUP=$(echo '${{ env.TZ_BY_HOUR }}' | python3 -c "import sys,json; print(json.load(sys.stdin).get(sys.argv[1],'ALL'))" "$HOUR")
            echo "group=$GROUP" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine if calibration day
        id: cal
        run: |
          DAY=$(date -u +%u)
          echo "is_tuesday=$( [ "$DAY" = "2" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Auto-calibrate (Tuesday only)
        if: steps.cal.outputs.is_tuesday == 'true'
        working-directory: box-office-tracker
        run: python3 calibrate.py

      - name: Collect seat data (${{ steps.tz.outputs.group }})
        if: steps.cal.outputs.is_tuesday != 'true'
        working-directory: box-office-tracker
        run: python3 scraper.py ${{ steps.tz.outputs.group }}

      - name: Generate predictions
        if: steps.cal.outputs.is_tuesday != 'true'
        working-directory: box-office-tracker
        run: python3 predict.py

      - name: Run trading (dry run)
        if: steps.cal.outputs.is_tuesday != 'true'
        working-directory: box-office-tracker
        env:
          DRY_RUN: "true"
        run: python3 trade.py || echo "Trade step skipped (no predictions or missing deps)"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add box-office-tracker/data/
          git diff --staged --quiet || git commit -m "data: box office ${{ steps.tz.outputs.group }} run"
          git push
